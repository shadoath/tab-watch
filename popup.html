<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabWatch</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Dark theme (default) ── */
      :root {
        --bg:                #0d1117;
        --border:            #1a2235;
        --border-item:       #161c2d;
        --hover-bg:          #141b2d;
        --text:              #e2e8f8;
        --text-title:        #ccd6f6;
        --text-label:        #7b8cc8;
        --text-url:          #4a5580;
        --text-empty:        #3a4465;
        --text-unknown:      #3a4465;
        --accent:            #1a6bff;
        --input-bg:          #161c2d;
        --input-border:      #243050;
        --favicon-ph:        #243050;
        --toggle-bg:         #161c2d;
        --toggle-border:     #243050;
        --toggle-text:       #7b8cc8;
        --stale-color:       #f9ab00;
      }

      /* ── Light theme ── */
      body.light {
        --bg:                #f0f4ff;
        --border:            #d0daf5;
        --border-item:       #e2eaf8;
        --hover-bg:          #e8f0ff;
        --text:              #0d1433;
        --text-title:        #1a2455;
        --text-label:        #5070c8;
        --text-url:          #7090cc;
        --text-empty:        #8098cc;
        --text-unknown:      #90a8d0;
        --accent:            #1a6bff;
        --input-bg:          #ffffff;
        --input-border:      #c0d0f0;
        --favicon-ph:        #d0ddf8;
        --toggle-bg:         #ffffff;
        --toggle-border:     #c0d0f0;
        --toggle-text:       #5070c8;
        --stale-color:       #d48000;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        width: 380px;
        max-height: 560px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: background 0.2s, color 0.2s;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      header h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-label);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #theme-toggle {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--toggle-bg);
        border: 1px solid var(--toggle-border);
        border-radius: 20px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 12px;
        color: var(--toggle-text);
        transition: border-color 0.15s, color 0.15s;
      }

      #theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      #theme-toggle .icon {
        font-size: 13px;
        line-height: 1;
      }

      #options-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 15px;
        color: var(--toggle-text);
        padding: 2px 4px;
        line-height: 1;
        transition: color 0.15s;
      }

      #options-btn:hover {
        color: var(--accent);
      }

      .search-wrap {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      #search {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }

      #search::placeholder {
        color: var(--text-empty);
      }

      #search:focus {
        border-color: var(--accent);
      }

      #tab-list {
        overflow-y: auto;
        flex: 1;
      }

      /* ── Animations ── */
      @keyframes tabIn {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .tab-item.animate {
        opacity: 0;
        animation: tabIn 0.18s ease forwards;
      }

      /* ── Tab rows ── */
      .tab-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-item);
        transition: background 0.1s, opacity 0.15s;
        cursor: pointer;
      }

      .tab-item:hover {
        background: var(--hover-bg);
      }

      .tab-item:last-child {
        border-bottom: none;
      }

      /* ── Stale warning ── */
      .tab-item.stale {
        opacity: 0.45;
      }

      .tab-item.stale:hover {
        opacity: 0.75;
      }

      .tab-item.stale .tab-duration {
        color: var(--stale-color);
      }

      .stale-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--stale-color);
        flex-shrink: 0;
      }

      /* ── Favicon ── */
      .favicon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        border-radius: 2px;
      }

      .favicon-placeholder {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        background: var(--favicon-ph);
        border-radius: 2px;
      }

      /* ── Tab info ── */
      .tab-info {
        flex: 1;
        min-width: 0;
      }

      .tab-title {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-title);
      }

      .tab-url {
        font-size: 11px;
        color: var(--text-url);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 1px;
      }

      /* ── Tab group chip ── */
      .group-chip {
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 10px;
        color: #fff;
        flex-shrink: 0;
        max-width: 72px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.9;
      }

      /* ── Duration ── */
      .tab-duration {
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        color: var(--accent);
        font-weight: 600;
        flex-shrink: 0;
        text-align: right;
      }

      .tab-duration.unknown {
        color: var(--text-unknown);
      }

      /* ── Column headers ── */
      .col-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .col-spacer {
        width: 16px;
        flex-shrink: 0;
      }

      .col-hd {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-url);
        cursor: pointer;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 3px;
        transition: color 0.15s;
      }

      .col-hd:hover {
        color: var(--text-label);
      }

      .col-hd.active {
        color: var(--accent);
      }

      .col-hd-tab {
        flex: 1;
      }

      .col-hd-duration {
        flex-shrink: 0;
      }

      .sort-arrow {
        font-size: 10px;
        width: 8px;
        display: inline-block;
      }

      .empty {
        padding: 32px 16px;
        text-align: center;
        color: var(--text-empty);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TabWatch</h1>
      <div class="header-actions">
        <button id="theme-toggle">
          <span class="icon">☀</span>
          <span class="label">Light</span>
        </button>
        <button id="options-btn" title="Settings">⚙</button>
      </div>
    </header>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search tabs..." autocomplete="off" spellcheck="false" />
    </div>
    <div class="col-header">
      <div class="col-spacer"></div>
      <div class="col-hd col-hd-tab" data-sort="title">Tab <span class="sort-arrow"></span></div>
      <div class="col-hd col-hd-duration active" data-sort="duration">Duration <span class="sort-arrow">↓</span></div>
    </div>
    <div id="tab-list"></div>
    <script src="popup.js"></script>
  </body>
</html>
