<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabWatch — Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Dark theme (default) ── */
      :root {
        --bg:           #0d1117;
        --bg-card:      #111827;
        --border:       #1a2235;
        --text:         #e2e8f8;
        --text-title:   #ccd6f6;
        --text-label:   #7b8cc8;
        --text-sub:     #4a5580;
        --accent:       #1a6bff;
        --input-bg:     #161c2d;
        --input-border: #243050;
        --toggle-track: #243050;
        --toggle-thumb: #4a5580;
      }

      body.light {
        --bg:           #f0f4ff;
        --bg-card:      #ffffff;
        --border:       #d0daf5;
        --text:         #0d1433;
        --text-title:   #1a2455;
        --text-label:   #5070c8;
        --text-sub:     #7090cc;
        --accent:       #1a6bff;
        --input-bg:     #ffffff;
        --input-border: #c0d0f0;
        --toggle-track: #d0daf5;
        --toggle-thumb: #7090cc;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 32px 24px;
        transition: background 0.2s, color 0.2s;
      }

      .page {
        max-width: 480px;
        margin: 0 auto;
      }

      /* ── Header ── */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }

      .page-header h1 {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-title);
        letter-spacing: -0.01em;
      }

      .page-header p {
        font-size: 13px;
        color: var(--text-sub);
        margin-top: 3px;
      }

      /* ── Section ── */
      .section {
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-sub);
        margin-bottom: 8px;
        padding: 0 2px;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      /* ── Option row ── */
      .option-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .option-row:last-child {
        border-bottom: none;
      }

      .option-row.disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      .option-text {
        flex: 1;
        min-width: 0;
      }

      .option-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-title);
      }

      .option-desc {
        font-size: 11px;
        color: var(--text-sub);
        margin-top: 2px;
        line-height: 1.4;
      }

      /* ── Toggle switch ── */
      .toggle-wrap {
        position: relative;
        width: 38px;
        height: 22px;
        flex-shrink: 0;
      }

      .toggle-wrap input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--toggle-track);
        border-radius: 22px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle-slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: var(--toggle-thumb);
        border-radius: 50%;
        transition: transform 0.2s, background 0.2s;
      }

      .toggle-wrap input:checked + .toggle-slider {
        background: var(--accent);
      }

      .toggle-wrap input:checked + .toggle-slider::before {
        background: #fff;
        transform: translateX(16px);
      }

      /* ── Threshold input ── */
      .threshold-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px 14px;
        border-top: 1px solid var(--border);
      }

      .threshold-row label {
        font-size: 12px;
        color: var(--text-sub);
      }

      .threshold-row input[type="number"] {
        width: 56px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 13px;
        color: var(--text-title);
        outline: none;
        text-align: center;
        transition: border-color 0.15s;
        -moz-appearance: textfield;
      }

      .threshold-row input[type="number"]::-webkit-inner-spin-button,
      .threshold-row input[type="number"]::-webkit-outer-spin-button {
        opacity: 1;
      }

      .threshold-row input[type="number"]:focus {
        border-color: var(--accent);
      }

      .threshold-row.disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      /* ── Saved indicator ── */
      #saved {
        font-size: 12px;
        color: var(--accent);
        opacity: 0;
        transition: opacity 0.3s;
        text-align: center;
        margin-top: 16px;
      }

      #saved.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <div>
          <h1>TabWatch Settings</h1>
          <p>Changes save automatically</p>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="section">
        <div class="section-title">Toolbar</div>
        <div class="card">
          <div class="option-row">
            <div class="option-text">
              <div class="option-label">Badge count</div>
              <div class="option-desc">Show the number of open tabs on the extension icon</div>
            </div>
            <label class="toggle-wrap">
              <input type="checkbox" id="opt_badge" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Tab display -->
      <div class="section">
        <div class="section-title">Tab Display</div>
        <div class="card">
          <div class="option-row">
            <div class="option-text">
              <div class="option-label">Tab groups</div>
              <div class="option-desc">Show color and name for grouped tabs</div>
            </div>
            <label class="toggle-wrap">
              <input type="checkbox" id="opt_groups" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="option-row" id="warn-row">
            <div class="option-text">
              <div class="option-label">Tab limit warning</div>
              <div class="option-desc">Dim tabs that have been open too long</div>
            </div>
            <label class="toggle-wrap">
              <input type="checkbox" id="opt_warn" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="threshold-row" id="threshold-row">
            <label for="opt_warn_days">Warn after</label>
            <input type="number" id="opt_warn_days" min="1" max="365" />
            <label for="opt_warn_days">days</label>
          </div>
        </div>
      </div>

      <!-- Appearance -->
      <div class="section">
        <div class="section-title">Appearance</div>
        <div class="card">
          <div class="option-row">
            <div class="option-text">
              <div class="option-label">Animations</div>
              <div class="option-desc">Fade in tabs when the popup opens</div>
            </div>
            <label class="toggle-wrap">
              <input type="checkbox" id="opt_animations" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div id="saved">Saved</div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
