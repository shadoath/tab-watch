name: "Release Drafter"
on:
  workflow_dispatch:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        uses: release-drafter/release-drafter@v5.23.0
