<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Crown (top button) -->
  <rect x="47" y="8" width="34" height="10" rx="5" fill="#1250cc"/>
  <!-- Stem -->
  <rect x="55" y="14" width="18" height="17" rx="4" fill="#1250cc"/>
  <!-- Body: rounded rect — suggests a tab/card + stopwatch -->
  <rect x="10" y="28" width="108" height="92" rx="18" fill="#1a6bff"/>
  <!-- Subtle clock ring -->
  <circle cx="64" cy="74" r="33" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2.5"/>
  <!-- Hour hand (~10 o'clock) -->
  <line x1="64" y1="74" x2="46" y2="56" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand (~12 o'clock) -->
  <line x1="64" y1="74" x2="64" y2="47" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="64" cy="74" r="5" fill="white"/>
</svg>
